[pytest]
testpaths = testing/api testing/ui testing/strategy/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --tb=short --cov=. --cov-report=html --cov-report=term-missing
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-End tests
    critical: Critical path tests
    asyncio: marks tests as asyncio (required by pytest-asyncio)
asyncio_mode = auto
